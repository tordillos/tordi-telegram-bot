name = "tordi-telegram-bot"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]

[[kv_namespaces]]
binding = "NEWS_KV"
# Crear con: npx wrangler kv namespace create NEWS_KV
# Luego pegar el id aquí
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Obtener con: enviar /start al bot en el grupo y revisar los logs
GROUP_CHAT_ID = ""
# ID del canal fuente para reenvío de mensajes
SOURCE_CHANNEL_ID = ""

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
