name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Replace secrets in wrangler.toml
        run: |
          sed -i "s/REPLACE_WITH_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/" wrangler.toml
          sed -i "s/GROUP_CHAT_ID = \"\"/GROUP_CHAT_ID = \"${{ secrets.GROUP_CHAT_ID }}\"/" wrangler.toml
          sed -i "s/SOURCE_CHANNEL_ID = \"\"/SOURCE_CHANNEL_ID = \"${{ secrets.SOURCE_CHANNEL_ID }}\"/" wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            BOT_TOKEN
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
